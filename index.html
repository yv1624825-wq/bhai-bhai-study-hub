<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhai-Bhai Study Hub | Super AI Solver</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f0f4f8; color: #333; }
        header { background: #1a2a6c; color: white; padding: 30px; text-align: center; border-bottom: 5px solid #f7b733; }
        .logo { width: 90px; border-radius: 50%; border: 3px solid #fff; }
        .container { max-width: 800px; margin: auto; padding: 20px; }
        
        /* Chat Box Design */
        .ai-card { background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); overflow: hidden; border: 2px solid #1a2a6c; }
        .ai-title { background: #1a2a6c; color: white; padding: 15px; font-weight: bold; font-size: 18px; }
        #chat-box { height: 400px; overflow-y: auto; padding: 20px; background: #fdfdfd; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 12px 18px; border-radius: 15px; font-size: 15px; line-height: 1.5; max-width: 80%; }
        .ai { background: #e8efff; color: #1a2a6c; align-self: flex-start; border-bottom-left-radius: 2px; }
        .user { background: #1a2a6c; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        
        .input-bar { display: flex; padding: 15px; background: #fff; border-top: 1px solid #ddd; }
        input { flex: 1; padding: 12px; border: 2px solid #eee; border-radius: 30px; outline: none; }
        button { background: #1a2a6c; color: white; border: none; padding: 10px 25px; border-radius: 30px; margin-left: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <img src="3708.png" alt="Logo" class="logo">
    <h1>Bhai-Bhai Study Hub</h1>
    <p>Puchiye koi bhi sawal, AI dega turant jawab! 🤖</p>
</header>

<div class="container">
    <div class="ai-card">
        <div class="ai-title">🧠 Smart Doubt Solver (Maths, Science, GK)</div>
        <div id="chat-box">
            <div class="msg ai">Ram-Ram Bhai! Main taiyar hoon aapke sawalon ke liye. Science, Maths ya GK ka kuch bhi puchiye! 🚀</div>
        </div>
        <div class="input-bar">
            <input type="text" id="user-in" placeholder="E.g. Newton's first law, HCF, India PM..." onkeypress="if(event.key==='Enter') startSolve()">
            <button onclick="startSolve()">Pucho</button>
        </div>
    </div>
</div>

<script>
const brain = {
    // SCIENCE
    "acid": "Acid wo substance hai jo swad mein khatta hota hai aur Blue Litmus ko Red kar deta hai. Example: HCl.",
    "base": "Base swad mein kadwa hota hai aur Red Litmus ko Blue kar deta hai. Example: NaOH.",
    "newton first law": "Newton ka pehla niyam: Koi object tab tak rest mein rahega jab tak us par koi bahri force na lage. Ise Law of Inertia bhi kehte hain.",
    "gravity": "Gravity wo force hai jisse prithvi har cheez ko apni taraf khinchti hai. Iski value 9.8 m/s² hoti hai.",
    "cell": "Cell life ki sabse chhoti unit hai. Ise 'Building Block of Life' kehte hain.",
    "mitochondria": "Mitochondria ko 'Powerhouse of the Cell' kaha jata hai kyunki ye energy banata hai.",
    "ph value": "pH scale 0 se 14 tak hota hai. 7 neutral hai, 7 se kam Acid aur 7 se zyada Base hota hai.",
    "atom": "Atom matter ka sabse chhota hissa hai jo Protons, Neutrons aur Electrons se bana hota hai.",
    
    // MATHS
    "hcf": "HCF (Highest Common Factor) wo sabse bada number hai jo di gayi sankhyao ko poora divide kar de.",
    "lcm": "LCM (Least Common Multiple) wo sabse chhoti sankhya hai jo di gayi sankhyao ke table mein aati hai.",
    "pythagoras": "Right-angled triangle mein: Hypotenuse² = Base² + Perpendicular². (a² + b² = c²)",
    "pi value": "Pi (π) ki value lagbhag 3.14 ya 22/7 hoti hai.",
    "area of circle": "Circle ka area formula: πr² hota hai.",
    "trigonometry": "Ye triangle ke sides aur angles ke rishte ki study hai (Sin, Cos, Tan).",
    "prime number": "Wo numbers jo sirf 1 aur apne aap se divide hote hain, jaise 2, 3, 5, 7, 11.",

    // GK
    "capital of india": "Bharat ki rajdhani New Delhi hai.",
    "prime minister of india": "Bharat ke vartaman Prime Minister Shri Narendra Modi ji hain.",
    "president of india": "Bharat ki vartaman President Smt. Droupadi Murmu ji hain.",
    "largest state": "Area ke hisab se Bharat ka sabse bada rajya Rajasthan hai.",
    "national bird": "Bharat ka rashtriya pakshi Peacock (Mor) hai.",
    "national animal": "Bharat ka rashtriya pashu Tiger (Baagh) hai.",
    "independence day": "Bharat 15 August 1947 ko azad hua tha.",
    "constitution": "Bharat ka sanvidhan 26 January 1950 ko lagu hua tha.",
    "father of nation": "Mahatma Gandhi ko Bharat ka Rashtrapita kaha jata hai.",

    // WEB & GENERAL
    "html": "HTML ka full form HyperText Markup Language hai. Ye website ka structure banati hai.",
    "css": "CSS ka full form Cascading Style Sheets hai. Ye website ko design aur sundar banati hai.",
    "javascript": "JS website mein dimaag aur logic dalne ke kaam aati hai."
};

function startSolve() {
    const input = document.getElementById('user-in');
    const box = document.getElementById('chat-box');
    const text = input.value.trim().toLowerCase();
    
    if(!text) return;

    box.innerHTML += `<div class="msg user">${input.value}</div>`;
    input.value = "";
    box.scrollTop = box.scrollHeight;

    let ans = "Bhai, ye sawal mast hai! Maine ise note kar liya hai. Filhaal iska deep answer hamari 'Science Master PDF' mein check karo. Main roz naye jawab seekh raha hoon!";

    // AI Logic: Check if keyword exists in brain
    for (let key in brain) {
        if (text.includes(key)) {
            ans = brain[key];
            break;
        }
    }

    setTimeout(() => {
        box.innerHTML += `<div class="msg ai"><b>Bhai AI:</b> ${ans}</div>`;
        box.scrollTop = box.scrollHeight;
    }, 500);
}
</script>

</body>
</html>
